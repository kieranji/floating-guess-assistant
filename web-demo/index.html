<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Guess Assistant - Web Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>AI 猜词助手 Demo</h1>
      <p class="subtitle">输入线索，系统会给出可能答案。</p>
      <p id="saveStatus" class="save-status">尚未自动保存</p>

      <label for="mode">选择模式</label>
      <select id="mode">
        <option value="semantic">相似度猜词</option>
        <option value="masked">揭字猜词</option>
      </select>

      <label for="clues">输入线索</label>
      <textarea
        id="clues"
        placeholder="例如：四字成语，和时间有关，形容时间过得很快"
      ></textarea>

      <section class="ocr-box">
        <h2>截图 OCR 识别</h2>

        <input
          id="ocrImageInput"
          type="file"
          accept="image/*"
        />

        <div class="ocr-image-preview-box">
          <p>图片预览，拖拽选择 OCR 区域</p>

          <div id="ocrImageWrapper" class="ocr-image-wrapper">
            <img id="ocrImagePreview" alt="OCR 图片预览" />
            <div id="ocrSelectionBox" class="ocr-selection-box"></div>
          </div>
        </div>

        <div class="ocr-crop-box">
          <h3>OCR 区域裁剪，可选</h3>

          <div class="ocr-crop-grid">
            <input id="ocrCropX" type="number" min="0" placeholder="x，例如 0" />
            <input id="ocrCropY" type="number" min="0" placeholder="y，例如 200" />
            <input id="ocrCropWidth" type="number" min="1" placeholder="宽，例如 500" />
            <input id="ocrCropHeight" type="number" min="1" placeholder="高，例如 600" />
          </div>

          <button id="clearOcrCropBtn" type="button" class="clear-ocr-crop-button">
            清除裁剪区域
          </button>

          <p class="ocr-crop-help">
            不填则识别整张图片。填写后只识别指定区域。
          </p>
        </div>

        <button id="ocrBtn" type="button" class="ocr-button">
          识别图片文字
        </button>

        <p id="ocrStatus" class="ocr-status">尚未识别图片。</p>

        <label for="ocrResult">OCR 识别结果</label>
        <textarea
          id="ocrResult"
          placeholder="识别出的文字会显示在这里"
        ></textarea>

        <button id="useOcrTextBtn" type="button" class="use-ocr-button">
          填入线索
        </button>

        <button id="cleanOcrBtn" type="button" class="clean-ocr-button">
          清洗 OCR 文本
        </button>

        <section class="ocr-preview-box">
          <h3>OCR 清洗预览</h3>
          <p id="ocrModePreview" class="ocr-mode-preview">模式判断：暂无</p>

          <div>
            <h4>可能线索，可编辑</h4>
            <textarea
              id="ocrCluePreview"
              placeholder="清洗出的线索会显示在这里，你可以手动修改"
            ></textarea>
          </div>

          <div>
            <h4>历史猜测，可编辑</h4>
            <textarea
              id="ocrGuessPreview"
              placeholder="清洗出的历史猜测会显示在这里，例如：听歌 48.4"
            ></textarea>
          </div>

          <div>
            <h4>被过滤内容</h4>
            <pre id="ocrNoisePreview">暂无</pre>
          </div>
        </section>
        <button id="applyOcrParsedBtn" type="button" class="apply-ocr-button">
          应用 OCR 清洗结果
        </button>

        <button id="ocrPromptBtn" type="button" class="ocr-prompt-button">
          生成直播截图分析 Prompt
        </button>

        <button id="ocrBackendAnalyzeBtn" type="button" class="ocr-backend-button">
          用 OCR 结果直接 AI 分析
        </button>
      </section>

      <label>添加历史猜测</label>

<div class="guess-input-row">
  <input
    id="guessWord"
    type="text"
    placeholder="猜测词，例如：光阴"
  />

  <input
    id="guessScore"
    type="number"
    min="0"
    max="100"
    placeholder="相似度"
  />

  <button id="addGuessBtn" type="button">添加</button>
</div>

<label for="guessHistory">历史猜测和相似度</label>
<textarea
  id="guessHistory"
  placeholder="每行一个，例如：&#10;光阴 84&#10;时间 72&#10;人生 35&#10;日月 61"
></textarea>

      <label>添加临时候选词</label>

      <div class="candidate-input-box">
        <input
          id="candidateWord"
          type="text"
          placeholder="候选词，例如：沧海桑田"
        />

        <input
          id="candidateKeywords"
          type="text"
          placeholder="关键词，用英文逗号分隔，例如：时间,变化,成语,岁月"
          />

        <input
          id="candidateReason"
          type="text"
          placeholder="解释，例如：形容世事变化很大"
        />

        <button id="addCandidateBtn" type="button">添加候选词</button>
      </div>

      <label for="customWords">临时候选词列表</label>
      <textarea
        id="customWords"
        placeholder="每行一个，例如：&#10;沧海桑田 | 时间,变化,成语,岁月 | 形容世事变化很大&#10;短剧 | 视频,娱乐,流行,手机 | 一种短时长剧情视频"
      ></textarea>

      <div class="button-row">
        <button id="exampleBtn" type="button">填入示例</button>
        <button id="clearBtn" type="button">清空</button>
        <button id="analyzeBtn" type="button">分析答案</button>
      </div>

      <div class="extra-button-row">
        <button id="copyBtn" type="button" class="copy-button">复制结果</button>
        <button id="exportBtn" type="button" class="export-button">导出 JSON</button>
      </div>

      <button id="promptBtn" type="button" class="prompt-button">生成 AI Prompt</button>

      <button id="backendAnalyzeBtn" type="button" class="backend-ai-button">
        后端 AI 分析
      </button>

      <label for="aiPrompt">AI Prompt</label>
      <textarea
        id="aiPrompt"
        placeholder="点击“生成 AI Prompt”或“后端 AI 分析”后，这里会显示发送给 AI 的提示词"
      ></textarea>
      
      <label for="aiResponse">AI 返回结果</label>
      <textarea
        id="aiResponse"
        placeholder="把 AI 返回的答案和分析粘贴到这里"
      ></textarea>

      <button id="saveAiResponseBtn" type="button" class="save-ai-button">
        保存 AI 分析
      </button>

      <button id="copyAiResponseBtn" type="button" class="copy-ai-button">
        复制 AI 分析
      </button>

      <section class="ai-response-box">
        <h2>已保存的 AI 分析</h2>
        <div id="savedAiResponse">暂无 AI 分析。</div>
      </section>

      <section class="ai-cards-box">
        <div class="ai-cards-header">
          <h2>AI 候选答案卡片</h2>

          <select id="aiCardLimit">
            <option value="5">Top 5</option>
            <option value="10">Top 10</option>
          </select>
        </div>

        <input
          id="aiCardSearch"
          type="text"
          placeholder="搜索 AI 候选词，例如：光阴"
        />

        <div id="aiCandidateCards">暂无结构化 AI 结果。</div>
      </section>

      <section class="followup-history-box">
        <h2>追问历史</h2>
        <div id="followupHistory">暂无追问历史。</div>
      </section>

      <label for="importJson">导入 JSON</label>
      <textarea
        id="importJson"
        placeholder="把导出的 JSON 粘贴到这里，然后点击“导入 JSON”"
      ></textarea>

      <button id="importBtn" type="button" class="import-button">导入 JSON</button>

      <section class="result-box">
        <h2>可能答案</h2>
        <ol id="resultList"></ol>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
